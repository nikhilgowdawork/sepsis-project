steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/sepsis-predictor', '.']
  
  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sepsis-predictor']
  
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sepsis-predictor'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sepsis-predictor'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300s'
      - '--set-env-vars'
      - 'GOOGLE_API_KEY=AIzaSyDFKc6DCTSSkuwmAAe7VYzUaJce4mdoxyw'

images:
  - 'gcr.io/$PROJECT_ID/sepsis-predictor'
